<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Love 💖</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

canvas {
  position: absolute;
}

h1 {
  position: absolute;
  font-size: 45px;
  color: pink;
  text-shadow: 0 0 20px red, 0 0 40px pink;
  z-index: 2;
}

#btn {
  position: absolute;
  z-index: 3;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: pink;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="btn" onclick="start()">💖 افتح المفاجأة 💖</button>

<h1>عمرو ❤️</h1>
<canvas id="c"></canvas>

<iframe id="music" width="0" height="0" frameborder="0" allow="autoplay"></iframe>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];
let targets = [];

// رسم القلب
function heart(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
  };
}

// نجهز نقاط القلب
for (let i = 0; i < 1000; i++) {
  let t = Math.random() * Math.PI * 2;
  let h = heart(t);

  targets.push({
    x: canvas.width/2 + h.x * 15,
    y: canvas.height/2 + h.y * 15
  });

  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    let target = targets[i];

    // الحركة نحو القلب
    p.x += (target.x - p.x)*0.05;
    p.y += (target.y - p.y)*0.05;

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

function start(){
  document.getElementById("btn").style.display="none";

  // تشغيل الأغنية
  document.getElementById("music").src =
  "https://www.youtube.com/embed/0k9m3tZK4r8?autoplay=1&loop=1&playlist=0k9m3tZK4r8";

  animate();
}
</script>

</body>
</html>
