<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Love Heart 💖</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

canvas {
  position: absolute;
}

h1 {
  position: absolute;
  text-align: center;
  font-size: 45px;
  color: pink;
  text-shadow: 0 0 25px red, 0 0 50px pink;
  animation: glow 2s infinite alternate;
  z-index: 2;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 40px pink; }
}

/* زر البداية */
#startBtn {
  position: absolute;
  z-index: 3;
  padding: 12px 22px;
  border: none;
  border-radius: 12px;
  background: pink;
  color: black;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 20px pink;
}
</style>
</head>

<body>

<button id="startBtn" onclick="start()">💖 افتح المفاجأة 💖</button>

<h1>عمرو ❤️</h1>
<canvas id="canvas"></canvas>

<!-- YouTube hidden player -->
<iframe id="music" width="0" height="0"
src=""
frameborder="0" allow="autoplay"></iframe>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heart(t) {
  let x = 16 * Math.pow(Math.sin(t), 3);
  let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return {x, y};
}

for (let i = 0; i < 1200; i++) {
  let t = Math.random() * Math.PI * 2;
  let pos = heart(t);

  particles.push({
    x: canvas.width/2 + pos.x * 15,
    y: canvas.height/2 + pos.y * 15,
    size: Math.random() * 2.5,
    alpha: Math.random()
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.alpha += (Math.random() - 0.5) * 0.05;

    ctx.fillStyle = `rgba(255,0,0,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

function start() {
  document.getElementById("startBtn").style.display = "none";

  // تشغيل الأغنية
  document.getElementById("music").src =
  "https://www.youtube.com/embed/0k9m3tZK4r8?autoplay=1&loop=1&playlist=0k9m3tZK4r8";
}
</script>

</body>
  </html>
